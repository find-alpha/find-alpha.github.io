{{/* layouts/_partials/components/alumni-card.html */}}

<div class="
  group relative flex flex-col rounded-2xl overflow-hidden
  border border-border dark:border-white/10
  bg-white dark:bg-[#222222]
  shadow-sm
  transition-all duration-300
  hover:-translate-y-1 hover:shadow-xl hover:border-primary/60
  active:translate-y-0 active:shadow-sm
">
  <div class="h-2 w-full bg-primary/80 transition-colors group-hover:bg-primary"></div>

  <div class="p-5 py-7 flex flex-col items-center text-center gap-2">
    <h4 class="text-lg font-bold text-dark dark:text-white tracking-wider">
      {{ .name }}
    </h4>

    <span class="inline-block px-2 py-0.5 rounded-md text-xs font-bold bg-black/5 dark:bg-white/10 text-dark dark:text-white">
      {{ if eq .generation 1 }}1기 <span class="tracking-wider font-normal">(창립멤버)</span>{{ else }}{{ .generation }}기{{ end }}
    </span>

    <p class="text-sm text-text dark:text-white/80 font-medium leading-snug">
      {{ .company }}
    </p>
  </div>
</div>
