copyright = "© Find-Alpha"
defaultContentLanguage = "ko"
disableKinds = ["taxonomy"]
enableRobotsTXT = true
languageCode = "ko"
timeZone = "Asia/Seoul"
timeout = "120s"
title = "Find-Alpha"

[params]
defaultTheme = "dark"
description = "Find-Alpha"
title = "Find-Alpha"
[params.author]
email = "admin@finda-group.com"
name = "Find-Alpha"
[params.socialIcons]
#facebook = "https://www.facebook.com/"
instagram = "https://www.instagram.com/official_find_a/"
github = "https://github.com/find-alpha"
youtube = "https://www.youtube.com/@FIND-A-Quant"
email = "mailto:admin@finda-group.com"
website = "https://find-alpha.github.io"
#mastodon = "https://example.com"
#pixelfed = "https://example.com"
#mixcloud = "https://example.com"
#flickr = "https://www.flickr.com"
#500px = "https://500px"
#whatsapp = "1234567890"
[params.gallery]
#boxSpacing = 10
#targetRowHeight = 288
#targetRowHeightTolerance = 0.25

[outputs]
home = ["HTML", "RSS"]
page = ["HTML"]
section = ["HTML"]

[imaging]
quality = 75
resampleFilter = "CatmullRom"
[imaging.exif]
disableDate = false
disableLatLong = true
includeFields = "ImageDescription|Orientation"

[module]
[module.hugoVersion]
min = "0.121.2"
[[module.imports]]
path = "github.com/nicokaiser/hugo-theme-gallery/v4"

[menu]
[[menu.footer]]
name = "GitHub"
url = "https://github.com/find-alpha"
weight = 3

[services]
[services.rss]
limit = 100
